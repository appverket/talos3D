[workspace]
members = [
    ".",
    "crates/cadio-ir",
    "crates/cadio-dwg",
    "crates/cadio-tools",
    "crates/talos3d-capability-api",
    "crates/talos3d-core",
    "crates/talos3d-architectural",
    "crates/talos3d-terrain",
]
resolver = "2"

[package]
name = "talos3d"
version = "0.1.0"
edition = "2021"

[features]
default = ["native", "terrain"]
native = ["bevy/x11"]
model-api = ["talos3d-core/model-api"]
perf-stats = ["talos3d-core/perf-stats", "talos3d-architectural/perf-stats"]
terrain = ["dep:talos3d-terrain"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "mesh_picking",
    "bevy_pbr",
    "bevy_picking",
    "bevy_post_process",
    "bevy_render",
    "bevy_scene",
    "bevy_state",
    "bevy_winit",
    "bevy_window",
    "bevy_text",
    "bevy_ui",
    "tonemapping_luts",
    "webgpu",
    "default_font",
    "png",
    "jpeg",
] }
talos3d-core = { path = "crates/talos3d-core" }
talos3d-architectural = { path = "crates/talos3d-architectural" }
talos3d-terrain = { path = "crates/talos3d-terrain", optional = true }

[dev-dependencies]
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1

[profile.release.package."*"]
opt-level = 3

[patch.crates-io]
# Fix bevy_egui scissor-rect crash on macOS first frame:
# clamp scissor to physical_target_size, not just viewport size.
bevy_egui = { path = "vendor/bevy_egui" }
