[workspace]
members = [
    ".",
    "crates/cadio-ir",
    "crates/cadio-dwg",
    "crates/cadio-tools",
    "crates/talos3d-capability-api",
    "crates/talos3d-core",
    "crates/talos3d-architectural",
    "crates/talos3d-terrain",
]
resolver = "2"

[package]
name = "talos3d"
version = "0.1.0"
edition = "2021"

[features]
default = ["native", "terrain"]
native = ["bevy/x11"]
model-api = ["talos3d-core/model-api"]
perf-stats = ["talos3d-core/perf-stats", "talos3d-architectural/perf-stats"]
terrain = ["dep:talos3d-terrain"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "mesh_picking",
    "bevy_pbr",
    "bevy_picking",
    "bevy_post_process",
    "bevy_render",
    "bevy_scene",
    "bevy_state",
    "bevy_winit",
    "bevy_window",
    "bevy_text",
    "bevy_ui",
    "tonemapping_luts",
    "webgpu",
    "default_font",
    "png",
    "jpeg",
] }
talos3d-core = { path = "crates/talos3d-core" }
talos3d-architectural = { path = "crates/talos3d-architectural" }
talos3d-architecture-core = { path = "../talos3d-architecture/crates/talos3d-architecture-core" }
talos3d-terrain = { path = "crates/talos3d-terrain", optional = true }

[dev-dependencies]
serde_json = "1"
toml = "0.8"
tempfile = "3"
talos3d-architecture-core = { path = "../talos3d-architecture/crates/talos3d-architecture-core", features = ["model-api"] }
talos3d-architecture-se = { path = "../talos3d-architecture/crates/talos3d-architecture-se", features = ["model-api"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1

[profile.release.package."*"]
opt-level = 3

[patch.crates-io]
# Fix bevy_egui scissor-rect crash on macOS first frame:
# clamp scissor to physical_target_size, not just viewport size.
bevy_egui = { path = "vendor/bevy_egui" }
egui = { path = "vendor/egui-0.33.3/egui" }
epaint = { path = "vendor/egui-0.33.3/epaint" }
emath = { path = "vendor/egui-0.33.3/emath" }
ecolor = { path = "vendor/egui-0.33.3/ecolor" }

# Local engine workflow notes:
# - Keep this vendored bevy_egui patch unless the bridge has been migrated.
# - Talos currently vendors the egui 0.33.3 line because bevy_egui still targets it.
# - When the bridge is upgraded, replace these vendored overrides with the newer bridge stack.
#
# - If you need local Bevy main, do that only on a dedicated Talos branch and
#   replace versioned `bevy = "0.18"` dependencies with path dependencies to:
#   /Users/torstenek/dev/bevy
#
# Full workflow:
# docs/ENGINE_FORK_WORKFLOW.md
